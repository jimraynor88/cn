site_name: CartaNatal.de
site_url: https://cartanatal.de
site_author: "Jim Raynor"
#edit_uri: ""
repo_url: https://cartanatal.de/servicios
repo_name: La Quiero!

theme:
  name: material
  language: es
  logo: assets/1px.png
  
  custom_dir: overrides
  palette:
    # Modo claro (fondo claro -> colores oscuros)
    - scheme: default
      primary: custom     # usaremos nuestro color personalizado
      accent: custom      # también personalizado
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro
    # Modo oscuro (fondo oscuro -> colores claros)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
  icon:
    repo: fontawesome/solid/bag-shopping
    #repo: material/brightness-7
  favicon: material/brightness-7
  highlightjs: true
  
  features:
    - navigation.tabs        # pestañas en el header
    - navigation.sections    # secciones expandibles en la barra lateral
    - navigation.tabs.sticky   # mantiene las pestañas visibles al hacer scroll.
    - navigation.indexes # usa los index.md como índices de sección (en lugar de enlazar a la primera subpágina).
    - navigation.prune # elimina las secciones vacías del menú lateral.
    - navigation.top #  añade un botón para volver arriba.
    - search.highlight # resalta los términos de búsqueda en los resultados.
    - search.suggest # activa autocompletado en la barra de búsqueda.
    - search.share # permite compartir enlaces de búsqueda.
    - search.term.highlight   # Resalta los términos de búsqueda dentro del contenido de la página
    - content.code.copy # añade un botón para copiar fragmentos de código.
    - content.code.select     # Permite seleccionar y copiar solo partes de bloques de código
    - content.code.scroll     # Hace que los bloques de código largos tengan scroll horizontal
    - content.code.line-numbers # Muestra números de línea en los bloques de código
    - content.code.annotate # permite anotar líneas de código (con iconos, etc.).
    - content.tabs.link       # Vincula pestañas de contenido entre sí para que persistan al cambiar de página
    - content.tooltips        # Muestra tooltips al pasar el cursor sobre enlaces de cabecera
    - content.footnote.tooltips # Muestra tooltips para notas al pie
    - navigation.path         # Muestra la ruta de navegación (breadcrumbs) en la parte superior
    - navigation.tracking     # Actualiza la URL con el título de la página al navegar (para instant)
    
extra_css:
  - assets/stylesheets/colors.css
#  - assets/stylesheets/cn.css
  - assets/stylesheets/astromitos.css
  - assets/stylesheets/iconos.css
  - assets/stylesheets/topbar.css

hooks:
  - hooks/read_aloud_hook.py

extra_javascript:
  - https://code.responsivevoice.org/responsivevoice.js?key=BH8TlfWs
  - assets/js/read-aloud-player.js
  - assets/js/tabs-header.js    

plugins:
  - search
  - ezlinks
  - encryptcontent:
      password_file: 'passwords.yml'
      webcrypto: true
      kdf_pow: 2
      remember_keys: true
      remember_password: false
      password_button: True
      password_button_text: 'Desbloquear'
      placeholder: 'Contraseña'
      placeholder_user: 'Usuario'
      summary: '⚠️ Esta página está protegida, accede a la sección [Servicios](/servicios), gracias.'
      decryption_failure_message: '❌ Credenciales incorrectas. Si el problema persiste, recarga la página e inténtalo de nuevo.'
      encryption_info_message: '🔒 Necesitas credenciales para ver este contenido.'
      encrypted_something:
        main: [main, tag]
 # - section-index
  - rss:
     feed:
        # ---- Feed del blog (solo posts de blog/posts/) ----
       - title: "AstroMitos RSS"
         description: "Últimos AstroMitos agregados"
         match_path: "AstroMitos/.*"          # regex para incluir solo posts
         date_from_meta:
           as_creation: date                 # campo 'date' del frontmatter
           date_format: '%Y-%m-%d'           # tu formato de fecha
           as_update: false
         output_path: "feed_blog.xml"        # archivo de salida
         length: 20
         abstract_chars_count: 160
        # ---- Feed general (todo el sitio que tenga rss_feed: true) ----
       - title: "Todo el sitio (selección)"
         description: "Páginas destacadas de la web"
         match_meta:                        # filtra por frontmatter
           rss_feed: true                   # solo páginas con 'rss_feed: true'
         date_from_meta:
           as_creation: date
           date_format: '%Y-%m-%d'
           as_update: false
         output_path: "feed_general.xml"
         length: 30
         abstract_chars_count: 200
  - glightbox
  - mkdocs-video

