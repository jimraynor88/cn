<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      .lock-body { fill: none; stroke: currentColor; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .lock-shackle { fill: none; stroke: currentColor; stroke-width: 12; stroke-linecap: round; }
      .keyhole { fill: currentColor; }
      .text-pgp { font-family: 'Segoe UI', 'Arial', sans-serif; font-weight: 700; font-size: 52px; fill: currentColor; letter-spacing: 4px; }
      .text-sub { font-family: 'Segoe UI', 'Arial', sans-serif; font-weight: 400; font-size: 18px; fill: currentColor; opacity: 0.7; }
    </style>
  </defs>

  <!-- Candado -->
  <rect x="35" y="45" width="70" height="55" rx="8" class="lock-body" />
  <path d="M 50 45 V 25 A 20 20 0 0 1 90 25 V 45" class="lock-shackle" />
  <circle cx="70" cy="65" r="8" class="keyhole" />
  <path d="M 64 70 L 76 70 L 72 82 L 68 82 Z" class="keyhole" />

  <!-- Llave sutil -->
  <g transform="translate(55, 55) scale(0.6)" opacity="0.4">
    <circle cx="20" cy="20" r="12" fill="none" stroke="currentColor" stroke-width="6"/>
    <line x1="30" y1="20" x2="60" y2="20" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="20" x2="55" y2="12" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
    <line x1="55" y1="20" x2="60" y2="28" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Texto -->
  <text x="130" y="78" class="text-pgp">PGP</text>
  <text x="130" y="100" class="text-sub">soyel.de</text>
</svg>
